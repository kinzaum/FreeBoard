<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web AAC Board</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f4f8; }
        #sentence-bar { width: 100%; min-height: 50px; background: white; border: 2px solid #ccc; margin-bottom: 20px; padding: 10px; display: flex; gap: 10px; align-items: center; font-size: 20px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .aac-btn { background: #fff; border: 3px solid #3498db; border-radius: 12px; padding: 20px; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s; }
        .aac-btn:active { transform: scale(0.95); }
        .action-btn { background: #2ecc71; color: white; border-color: #27ae60; }
        .clear-btn { background: #e74c3c; color: white; border-color: #c0392b; }
    </style>
</head>
<body>

    <div id="sentence-bar">👉 </div>

    <div class="grid">
        <button class="aac-btn" onclick="addWord('I want')">I want</button>
        <button class="aac-btn" onclick="addWord('Help')">Help</button>
        <button class="aac-btn" onclick="addWord('More')">More</button>
        <button class="aac-btn" onclick="addWord('Stop')">Stop</button>
        <button class="aac-btn" onclick="addWord('Eat')">Eat</button>
        <button class="aac-btn" onclick="addWord('Drink')">Drink</button>
        
        <button class="aac-btn action-btn" onclick="speakSentence()">🗣️ Speak</button>
        <button class="aac-btn clear-btn" onclick="clearSentence()">❌ Clear</button>
    </div>

    <script>
        let currentSentence = [];
        const sentenceBar = document.getElementById('sentence-bar');

        function addWord(word) {
            currentSentence.push(word);
            sentenceBar.innerText = "👉 " + currentSentence.join(' ');
            
            // Optional: Speak the individual word immediately on press
            speak(word); 
        }

        function speakSentence() {
            if (currentSentence.length === 0) return;
            speak(currentSentence.join(' '));
        }

        function clearSentence() {
            currentSentence = [];
            sentenceBar.innerText = "👉 ";
        }

        function speak(text) {
            // Using the browser's built-in Speech Synthesis
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Optional: Customize voice properties
            // utterance.rate = 0.9; // Slightly slower for clarity
            
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
